<!DOCTYPE html>
<html>
<head>
    <title>Login</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="login-container">

    <div class="card">

        <h1>Utility Usage Prediction Tool</h1>

        <form method="POST">

            <input type="text"
                   name="username"
                   placeholder="Username"
                   required>

            <input type="password"
                   name="password"
                   placeholder="Password"
                   required>

            <button class="btn">
                Login
            </button>

        </form>

        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}

    </div>

</div>

</body>
</html>
